name: mega-md
services:
  - name: mega-md
    type: web
    dockerfile: lib/Dockerfile
    ports:
      - port: 5000
        protocol: http
    env:
      - key: SESSION_ID
        value: ""
      - key: OWNER_NUMBER
        value: "923000000000"
      - key: BOT_NAME
        value: "MEGA-MD"
      - key: COMMAND_MODE
        value: "public"
      - key: TIMEZONE
        value: "Asia/Karachi"
      - key: MONGO_URL
        value: ""
      - key: POSTGRES_URL
        value: ""
      - key: MYSQL_URL
        value: ""
      - key: DB_URL
        value: ""
    run: npm run start:optimized
